<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .hidden {
            display: none;
        }

        .issue-card-open {
            border-top: 5px solid #22c55e !important;
        }

        .issue-card-closed {
            border-top: 5px solid #9333ea !important;
        }

        .btn-filter {
            padding: 10px 35px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
        }

        .active-all {
            background-color: #4f46e5 !important;
            color: white !important;
            border-color: #4f46e5;
        }

        .active-open {
            background-color: #22c55e !important;
            color: white !important;
            border-color: #22c55e;
        }

        .active-closed {
            background-color: #9333ea !important;
            color: white !important;
            border-color: #9333ea;
        }

        .modal-bg {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }

        .close-btn {
            background-color: #4f46e5;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 700;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background-color: #4338ca;
        }
    </style>
</head>

<body>



    <div id="login-area" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
            <div class="flex flex-col items-center mb-8">
                <img class="w-12" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
                <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Username</label>
                    <input type="text" id="user-input" placeholder="Enter Username"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none focus:ring-1 focus:ring-indigo-400 bg-white">
                    <p class="text-blue-600 text-xs mt-1">Default: admin</p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">Password</label>
                    <input type="password" id="pass-input" placeholder="Enter Password"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none focus:ring-1 focus:ring-indigo-400 bg-white">
                    <p class="text-blue-600 text-xs mt-1">Default: admin123</p>
                </div>

                <button onclick="startLogin()"
                    class="w-full bg-[#4f00ff] text-white font-bold py-3.5 rounded-lg hover:bg-indigo-700 transition duration-200">
                    Sign In
                </button>

                <div class="relative flex py-3 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs font-medium">OR</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl text-center border border-gray-50">
                    <p class="text-gray-400 text-xs font-semibold mb-3">Demo Credentials:</p>
                    <p class="text-gray-700 text-sm font-bold">Username: <span class="font-medium">admin</span></p>
                    <p class="text-gray-700 text-sm font-bold">Password: <span class="font-medium">admin123</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav
            class="bg-white border-b px-8 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <i class="fab fa-github text-3xl text-gray-800"></i>
                <span class="font-extrabold text-xl tracking-tight text-gray-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative flex-grow min-w-[300px]">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="find-box" onkeyup="searchMe()" placeholder="Search issues..."
                        class="w-full pl-11 pr-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-indigo-500 bg-gray-50">
                </div>
                <button
                    class="bg-[#4f46e5] text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow hover:bg-indigo-700 transition">+
                    New Issue</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-8">
            <div class="flex gap-3 mb-10 bg-white p-2 rounded-xl border border-gray-100 shadow-sm ">
                <button id="all" onclick="filterData('all')" class="btn-filter active-all">All</button>
                <button id="open" onclick="filterData('open')" class="btn-filter">Open</button>
                <button id="closed" onclick="filterData('closed')" class="btn-filter">Closed</button>
            </div>

            <div
                class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                <div class="flex items-center gap-4">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                        <h3 id="info-text" class="text-2xl font-black text-gray-900 leading-none">0 Issues</h3>
                        <p class="text-[12px] text-gray-400 font-bold mt-1 uppercase tracking-wide">Track and manage
                            your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-xs font-bold text-gray-500 uppercase">
                    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
                        Open</span>
                    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-purple-600"></span>
                        Closed</span>
                </div>
            </div>

            <div id="loader" class=" flex justify-center py-10">
                <span class="loading loading-dots loading-xl"></span>
            </div>

            <div id="card-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                
            </div>
        </div>
    </div>

    <div id="item-modal" class="fixed inset-0 modal-bg hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[24px] w-full max-w-2xl overflow-hidden relative shadow-2xl p-8">
            <div id="modal-data"></div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
