<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- -----------daisyui link------------ -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div id="login-area" class="min-h-screen flex items-center justify-center p-5">
        <div class="bg-white p-10 rounded-[30px] shadow-lg border border-gray-100 w-full max-w-sm text-center">
           <div class="flex items-center justify-center py-4">
            <img src="./assets/github-logo.png" alt="">
           </div>
            
            <div class="py-5">
                <h2 class="text-2xl font-bold text-gray-800 ">Login to Tracker</h2>
                <p class="text-sm text-gray-500">Sign in to manage your issues</p>
            </div>
            
            <div class="text-left space-y-4">
                <label for="">Username</label>
                <input type="text" id="user-input" placeholder="Username" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <label for="">Password</label>
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <button onclick="startLogin()" class="w-full bg-[#4f46e5] text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-300">Sign In</button>
            </div>
            <p class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Demo: admin / admin123</p>
        </div>
    </div>


    <!-- -------------main---------------- -->

     <div id="main-app" class="hidden">
        <nav class="bg-white border-b px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <img class="w-12" src="./assets/github-logo.png" alt="">
                <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="find-box" onkeyup="searchMe()" placeholder="Find issues..." class="flex-grow px-4 py-2 border rounded-lg outline-none focus:border-indigo-500">
                <button class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold text-sm">+ New Issue</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div class="flex gap-2 mb-8">
                <button id="all"  class="active-filter px-6 py-2 rounded-lg font-bold text-xs border">All</button>
                <button id="open"  class="bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500">Open</button>
                <button id="closed"  class="bg-white px-6 py-2 rounded-lg font-bold text-xs border text-gray-500">Closed</button>
            </div>

            <h3 id="info-text" class="text-xl font-bold mb-6 italic text-gray-700">Checking issues...</h3>

            <div id="card-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    



<script src="./index.js"></script>
</body>

</html>
