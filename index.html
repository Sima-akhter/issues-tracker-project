<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- -----------daisyui link------------ -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div id="login-area" class="min-h-screen flex items-center justify-center p-5">
        <div class="bg-white p-10 rounded-[30px] shadow-lg border border-gray-100 w-full max-w-sm text-center">
           <div class="flex items-center justify-center py-4">
            <img src="./assets/github-logo.png" alt="">
           </div>
            
            <div class="py-5">
                <h2 class="text-2xl font-bold text-gray-800 ">Login to Tracker</h2>
                <p class="text-sm text-gray-500">Sign in to manage your issues</p>
            </div>
            
            <div class="text-left space-y-4">
                <label for="">Username</label>
                <input type="text" id="user-input" placeholder="Username" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <label for="">Password</label>
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50">
                <button  class="w-full bg-[#4f46e5] text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-300">Sign In</button>
            </div>
            <p class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Demo: admin / admin123</p>
        </div>
    </div>



<script src="./index.js"></script>
</body>

</html>
